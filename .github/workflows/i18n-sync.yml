name: i18n-sync

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.ko.md'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.ko.md'

jobs:
  drift-check:
    name: README ko/en drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required so `git log -1 --format=%ct` resolves age

      - name: Fetch canonical drift guard from meta repo
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/clawket/clawket/main/scripts/check-i18n-sync.sh \
            -o /tmp/check-i18n-sync.sh
          chmod +x /tmp/check-i18n-sync.sh

      - name: Run drift check
        run: bash /tmp/check-i18n-sync.sh --repo .
